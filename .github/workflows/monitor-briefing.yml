name: Monitor & Auto-Retry Briefing

on:
  schedule:
    # Check 30 min after each briefing time (GST = UTC+4)
    # After 2:30 PM GST = check at 11:10 UTC
    - cron: "10 11 * * 1-5"
    # After 9:00 PM GST = check at 17:45 UTC
    - cron: "45 17 * * 1-5"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check last briefing run and retry if failed
        env:
          GH_TOKEN: ${{ secrets.BRIEFING_PAT }}
          REPO: uaesniper606-byte/Claude-Emails
        run: |
          echo "=== Checking last Daily Morning Briefing run ==="

          # Get the most recent run of daily-briefing workflow
          RESULT=$(curl -s -H "Authorization: token $GH_TOKEN"             "https://api.github.com/repos/$REPO/actions/workflows/daily-briefing.yml/runs?per_page=1")

          STATUS=$(echo $RESULT | python3 -c "import sys,json; runs=json.load(sys.stdin)['workflow_runs']; print(runs[0]['status'] if runs else 'none')")
          CONCLUSION=$(echo $RESULT | python3 -c "import sys,json; runs=json.load(sys.stdin)['workflow_runs']; print(runs[0]['conclusion'] or 'none' if runs else 'none')")
          CREATED=$(echo $RESULT | python3 -c "import sys,json; runs=json.load(sys.stdin)['workflow_runs']; print(runs[0]['created_at'] if runs else 'none')")

          echo "Last run: $CREATED | Status: $STATUS | Conclusion: $CONCLUSION"

          if [ "$STATUS" = "completed" ] && [ "$CONCLUSION" = "success" ]; then
            echo "✅ Last briefing ran successfully — no action needed."
          else
            echo "⚠️ Briefing failed or did not run — triggering retry..."
            curl -s -X POST               -H "Authorization: token $GH_TOKEN"               -H "Accept: application/vnd.github.v3+json"               -H "Content-Type: application/json"               "https://api.github.com/repos/$REPO/actions/workflows/daily-briefing.yml/dispatches"               -d '"{"ref": "main"}"'
            echo "🔄 Retry triggered."
          fi
