name: Send Email via Resend

on:
  repository_dispatch:
    types: [send-email]

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send email through Resend
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MAIL_FROM: ${{ github.event.client_payload.from }}
          MAIL_TO: ${{ github.event.client_payload.to }}
          MAIL_SUBJECT: ${{ github.event.client_payload.subject }}
          MAIL_TEXT: ${{ github.event.client_payload.text }}
        run: |
          payload=$(jq -n \
            --arg from "$MAIL_FROM" \
            --arg to "$MAIL_TO" \
            --arg subject "$MAIL_SUBJECT" \
            --arg text "$MAIL_TEXT" \
            '{from: $from, to: [$to], subject: $subject, text: $text}')

          echo "Sending email to $MAIL_TO ..."
          http_code=$(curl -s -o response.json -w "%{http_code}" \
            -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$payload")

          echo "Resend HTTP status: $http_code"
          cat response.json
          echo ""

          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo "Email sent successfully."
          else
            echo "Email send FAILED."
            exit 1
          fi
